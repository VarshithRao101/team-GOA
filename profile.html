<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Food Share</title>
    <meta name="description" content="Manage your account details and view your impact">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="background-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="dashboard-wrapper" style="max-width: 600px;">
        <main class="dashboard-card" style="padding: 2.5rem;">
            <!-- Header with Back Button -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem;">
                <a href="dashboard.html" class="back-btn" style="margin-bottom: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Dashboard
                </a>
                <h1 style="font-size: 1.6rem; color: #1a241e; font-weight: 700; margin: 0;">My Profile</h1>
                <div style="width: 100px;"></div> <!-- Spacer for exact centering -->
            </div>

            <!-- Impact Stats Section -->
            <div style="background: #fdfdfd; border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2.5rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; box-shadow: 0 4px 15px rgba(43, 122, 75, 0.03);">
                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <span style="font-size: 1.8rem; font-weight: 700; color: var(--primary-color);" id="stat-total">0</span>
                    <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Total Shared</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.4rem; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color);">
                    <span style="font-size: 1.8rem; font-weight: 700; color: #1a241e;" id="stat-active">0</span>
                    <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Active Listings</span>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.4rem;">
                    <span style="font-size: 1.8rem; font-weight: 700; color: #1a241e;" id="stat-completed">0</span>
                    <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Completed</span>
                </div>
            </div>

            <!-- Profile Info Form Layout -->
            <form id="profileForm" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" value="Donor User" readonly style="color: var(--text-muted);">
                </div>
                
                <div class="input-group">
                    <label for="emailAddress">Email Address</label>
                    <input type="email" id="emailAddress" value="donor@foodshare.org" readonly style="color: var(--text-muted);">
                </div>
                
                <div class="input-group" style="margin-bottom: 2.5rem;">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" value="+1 (555) 123-4567" readonly style="color: var(--text-muted);">
                </div>

                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button type="button" class="login-btn" style="background-color: #fff; color: var(--primary-color); border: 2px solid var(--primary-color); padding: 0.85rem; flex: 1;" onclick="toggleEditMode()">
                        Edit Profile
                    </button>
                    <button type="button" class="login-btn" style="flex: 1; padding: 0.95rem; opacity: 0.5; cursor: not-allowed;" onclick="saveChanges()" id="saveBtn" disabled>
                        Save Changes
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Frontend UI Logic -->
    <script>
        // Load dynamically populated fake-stats based on identical existing data array logic
        document.addEventListener('DOMContentLoaded', () => {
            const donations = JSON.parse(localStorage.getItem('foodDonations')) || [];
            
            let active = 0;
            let completed = 0;
            const now = new Date();

            donations.forEach(d => {
                const expiry = d.expiryTime ? new Date(d.expiryTime) : null;
                const isExpired = expiry && now >= expiry;
                
                if (d.claimed) {
                    completed++;
                } else if (!isExpired) {
                    active++;
                }
            });

            document.getElementById('stat-total').textContent = donations.length;
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-completed').textContent = completed;
        });

        // Simulated UI toggles for Edit / Save operations
        let isEditing = false;
        
        function toggleEditMode() {
            isEditing = !isEditing;
            const inputs = document.querySelectorAll('#profileForm input');
            const saveBtn = document.getElementById('saveBtn');
            const editBtn = document.querySelector('button[onclick="toggleEditMode()"]');
            
            inputs.forEach(input => {
                input.readOnly = !isEditing;
                if (isEditing) {
                    input.style.backgroundColor = '#f0faf4';
                    input.style.borderColor = 'var(--primary-color)';
                    input.style.color = '#1a241e';
                } else {
                    input.style.backgroundColor = '#fff';
                    input.style.borderColor = 'var(--border-color)';
                    input.style.color = 'var(--text-muted)';
                }
            });

            if (isEditing) {
                editBtn.textContent = 'Cancel';
                editBtn.style.color = '#dc2626';
                editBtn.style.borderColor = '#dc2626';
                
                saveBtn.disabled = false;
                saveBtn.style.opacity = '1';
                saveBtn.style.cursor = 'pointer';
            } else {
                editBtn.textContent = 'Edit Profile';
                editBtn.style.color = 'var(--primary-color)';
                editBtn.style.borderColor = 'var(--primary-color)';
                
                saveBtn.disabled = true;
                saveBtn.style.opacity = '0.5';
                saveBtn.style.cursor = 'not-allowed';
            }
        }

        function saveChanges() {
            if (!isEditing) return;
            
            // Trigger visual feedback to mock an API request fulfilling
            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.textContent;
            saveBtn.innerHTML = '<span style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Saved</span>';
            saveBtn.style.backgroundColor = 'var(--primary-hover)';
            
            setTimeout(() => {
                saveBtn.textContent = 'Save Changes';
                saveBtn.style.backgroundColor = 'var(--primary-color)';
                toggleEditMode(); // Automtically exit edit mode after saving
            }, 1200);
        }
    </script>
</body>
</html>
