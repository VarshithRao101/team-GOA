<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Listings - Food Share</title>
    <meta name="description" content="View and manage your active and past food donations">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="background-decor">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="dashboard-wrapper" style="max-width: 800px;">
        <main class="dashboard-card">
            <!-- Header with Back Button -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
                <a href="dashboard.html" class="back-btn" style="margin-bottom: 0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Dashboard
                </a>
                <h1 style="font-size: 1.6rem; color: #1a241e; font-weight: 700; margin: 0;">My Listings</h1>
                <div style="width: 100px;"></div> <!-- Spacer for centering title -->
            </div>

            <div id="manage-donations-container" class="donations-grid">
                <!-- Cards will be dynamically injected here using existing data format -->
            </div>
            
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('manage-donations-container');
            const donations = JSON.parse(localStorage.getItem('foodDonations')) || [];

            if (donations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 4rem 1rem; background: var(--card-bg); border-radius: 20px; border: 2px dashed rgba(43, 122, 75, 0.2); grid-column: 1 / -1; margin-top: 1rem;">
                        <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.8;">🍽️</div>
                        <h3 style="font-size: 1.35rem; color: #1a241e; margin-bottom: 0.5rem; font-weight: 600;">No donations yet</h3>
                        <p style="color: var(--text-muted); font-size: 0.95rem;">You haven't posted any food donations yet. Create one to manage it here.</p>
                    </div>
                `;
                return;
            }

            const formatTime = (isoString) => {
                if (!isoString) return 'N/A';
                return new Date(isoString).toLocaleString(undefined, {
                    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });
            };

            const renderTime = new Date();

            [...donations].reverse().forEach((donation, idx) => {
                const card = document.createElement('div');
                card.className = 'donation-item';

                let rawStatus = 'Available';
                const expiry = donation.expiryTime ? new Date(donation.expiryTime) : null;
                const isExpired = expiry && renderTime >= expiry;
                
                if (donation.claimed) {
                    rawStatus = 'Claimed';
                    card.style.opacity = '0.75';
                    card.style.backgroundColor = '#f9fafb';
                } else if (isExpired) {
                    rawStatus = 'Expired';
                    card.classList.add('donation-item--expired');
                }

                // Dynamic Status UI styles matched to dashboard UI theme
                let statusClass = '';
                let dotClass = '';
                let claimStyle = '';
                let claimDotStyle = '';
                
                if (rawStatus === 'Expired') {
                    statusClass = 'donation-status--expired';
                    dotClass = 'status-dot--expired';
                } else if (rawStatus === 'Claimed') {
                    claimStyle = 'background: #e5e7eb; color: #4b5563;';
                    claimDotStyle = 'background: #6b7280; animation: none;';
                }

                // Inject purely UI elements with no complex timer updates
                card.innerHTML = `
                    <div class="donation-card-header">
                        <div class="donation-status ${statusClass}" data-status style="${claimStyle}">
                            <span class="status-dot ${dotClass}" data-dot style="${claimDotStyle}"></span>
                            <span data-status-text>${rawStatus}</span>
                        </div>
                        <span class="donation-time-badge">${formatTime(donation.timePrepared)}</span>
                    </div>
                    <div class="donation-card-body">
                        <h3 class="donation-title">${donation.foodType || 'Food Item'}</h3>
                        <div class="donation-location" style="font-size: 0.9rem; color: var(--text-muted); margin-top: -0.5rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px; margin-bottom: 2px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>${donation.location || 'N/A'}
                        </div>
                        <div class="donation-info-grid">
                            <div class="info-card">
                                <span class="info-label">Portion Info</span>
                                <span class="info-value">${donation.quantity || 'N/A'}${donation.servings ? `<span style="opacity: 0.7; font-size: 0.85em; font-weight: 400; margin-left: 0.3rem;">(${donation.servings} Servings)</span>` : ''}</span>
                            </div>
                            <div class="info-card">
                                <span class="info-label">Use By</span>
                                <span class="info-value text-urgent">${formatTime(donation.expiryTime)}</span>
                            </div>
                        </div>

                        <div class="donation-actions" style="display: flex; gap: 0.8rem; margin-top: 1.25rem; padding-top: 1rem;">
                            <button class="btn-action edit-btn" style="flex: 1; padding: 0.6rem; text-align: center; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.95rem; background: #eefaf1; color: var(--primary-color); border: none; transition: all 0.2s; cursor: pointer;">Edit</button>
                            <button class="btn-action delete-btn" style="flex: 1; padding: 0.6rem; text-align: center; border-radius: 8px; font-weight: 600; font-size: 0.95rem; background: #fef2f2; color: #dc2626; border: none; transition: all 0.2s; cursor: pointer;">Delete</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
