<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receiver Login | Food Donation</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-icon">
          <i class="ph ph-hand-heart"></i>
        </div>
        <h1>Receiver Login</h1>
        <p>Access your organization dashboard to find nearby food donations and support your community.</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group" id="emailGroup">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="organization@example.com" autocomplete="email">
          <span class="error-message">Please enter a valid email address.</span>
        </div>

        <div class="form-group" id="passwordGroup">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <i class="ph ph-eye-slash" id="toggleIcon"></i>
            </button>
          </div>
          <span class="error-message">Password is required.</span>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Login to Dashboard
        </button>

        <div class="auth-links">
          <span>Don't have an organization account?</span>
          <a href="signup.html">Sign Up here</a>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast">
    <i class="ph ph-check-circle"></i>
    <span id="toastMsg">Login successful! Redirecting...</span>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const emailGroup = document.getElementById('emailGroup');
      const passwordGroup = document.getElementById('passwordGroup');
      
      const togglePasswordBtn = document.getElementById('togglePassword');
      const toggleIcon = document.getElementById('toggleIcon');
      const toast = document.getElementById('toast');
      const loginBtn = document.getElementById('loginBtn');

      // Password visibility toggle
      togglePasswordBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        if (type === 'password') {
          toggleIcon.classList.replace('ph-eye', 'ph-eye-slash');
        } else {
          toggleIcon.classList.replace('ph-eye-slash', 'ph-eye');
        }
      });

      // Simple email validation regex
      const isValidEmail = (email) => {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(String(email).toLowerCase());
      };

      // Form submission mock
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let isValid = true;
        
        // Reset errors
        emailGroup.classList.remove('error');
        passwordGroup.classList.remove('error');

        // Validate email
        if (!emailInput.value.trim() || !isValidEmail(emailInput.value)) {
          emailGroup.classList.add('error');
          isValid = false;
        }

        // Validate password
        if (!passwordInput.value.trim()) {
          passwordGroup.classList.add('error');
          isValid = false;
        }

        if (isValid) {
          // Mock successful login
          loginBtn.innerHTML = '<i class="ph ph-spinner ph-spin"></i> Logging in...';
          loginBtn.disabled = true;
          
          setTimeout(() => {
            showToast('Login successful! Redirecting...');
            
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          }, 800);
        }
      });

      function showToast(message) {
        document.getElementById('toastMsg').textContent = message;
        toast.classList.add('show', 'success');
        
        setTimeout(() => {
          toast.classList.remove('show');
        }, 3000);
      }
    });
  </script>
</body>
</html>
